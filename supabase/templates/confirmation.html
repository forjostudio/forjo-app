<!--
  H-02 / MAIL-02 — Mail de confirmación de alta, brandeado (Forjo, español).

  Lo único que NO se puede tocar es la mecánica del href: el token_hash viaja acá adentro y es lo
  único que autoriza la confirmación. El href usa {{ .SiteURL }} (valor de la CONFIG del proyecto) y
  {{ .TokenHash }}, y esas son las ÚNICAS dos variables de Go template del archivo.

  Prohibido volver a la variable de confirmación por defecto de Supabase (pasa por /auth/v1/verify y
  vuelve con `?code=`, que app/auth/callback/route.ts NO acepta → el link muere en invalid_link), y
  prohibida cualquier variable de redirect reflejada del navegador (open redirect, T-06-02).

  `type=signup` tiene que coincidir EXACTO con la allowlist ALLOWED_TYPES de lib/auth/callback.ts. El
  destino post-canje lo resuelve el handler server-side: signup → /onboarding (D-13).

  Los nombres de las variables prohibidas se refieren por concepto a propósito: el guard
  test/auth-email-templates.test.ts greppea que NO aparezcan en este archivo (higiene de grep, T-06-06).

  HTML email-client-safe: <table> anidadas, todo el CSS inline, sin <style>, sin JS. El logo va
  hospedado por URL (nunca embebido en el HTML: Gmail bloquea las imágenes inline).
-->
<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/></head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:'Helvetica Neue',Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f5f5f5;padding:40px 0;">
  <tr><td align="center">
    <table width="560" cellpadding="0" cellspacing="0" style="max-width:560px;width:100%;">

      <tr><td style="background:#1a1714;padding:32px 40px;border-radius:12px 12px 0 0;text-align:center;">
        <img src="https://gestion.forjo.studio/brand/forjo-gestion-lockup-crema.png" alt="Forjo" height="40" style="max-height:40px;display:block;margin:0 auto;border:0;"/>
      </td></tr>

      <tr><td style="background:#ffffff;padding:40px 40px 32px;">
        <p style="font-size:22px;font-weight:700;color:#1a1a1a;margin:0 0 12px;">Confirmá tu cuenta</p>
        <p style="font-size:15px;color:#555;margin:0 0 32px;line-height:1.6;">
          Tocá el botón para confirmar tu cuenta en <strong>Forjo</strong> y empezar a usar tu panel.
        </p>

        <table cellpadding="0" cellspacing="0" style="margin:0;"><tr><td style="border-radius:8px;background:#d94a2b;">
          <a href="{{ .SiteURL }}/auth/callback?token_hash={{ .TokenHash }}&type=signup" style="display:inline-block;padding:13px 28px;font-size:15px;font-weight:700;color:#ffffff;text-decoration:none;border-radius:8px;">Confirmar cuenta</a>
        </td></tr></table>

        <p style="font-size:13px;color:#999;line-height:1.7;margin:24px 0 0;">
          Si no creaste una cuenta en Forjo, ignorá este mail.
        </p>
      </td></tr>

      <tr><td style="background:#1a1714;padding:20px 40px;border-radius:0 0 12px 12px;text-align:center;">
        <div style="font-size:11px;color:rgba(255,255,255,.55);">Enviado por Forjo · forjo.studio</div>
      </td></tr>

    </table>
  </td></tr>
</table>
</body>
</html>
