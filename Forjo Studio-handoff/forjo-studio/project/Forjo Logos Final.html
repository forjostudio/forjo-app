<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Forjo Studio — pack final 09 + 14</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0a; font-family: 'Space Grotesk', sans-serif; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="final.jsx"></script>

<script type="text/babel" data-presets="react">
(() => {
const DC = window.DesignCanvas;
const Section = window.DCSection;
const Artboard = window.DCArtboard;

const W = 540, H = 320;
const HEAD_W = 760, HEAD_H = 340;

function App() {
  return (
    <DC
      title="Forjo Studio — pack final · 09 Bauhaus + 14 F Block"
      subtitle="Primero elegí variante de marca-F para el 09. Después, packs completos de ambos: hero, lockup horizontal, favicons, paletas, header del sitio y tarjeta."
    >
      <Section id="bauf" title="Marca Bauhaus rediseñada · una F construida con primitivas (elegí una)">
        <Artboard id="bauf-a" label="A · primitivos puros (recomendada)" width={W} height={H}><F09NEW_MarkA/></Artboard>
        <Artboard id="bauf-b" label="B · grilla 3×4 modular" width={W} height={H}><F09NEW_MarkB/></Artboard>
        <Artboard id="bauf-c" label="C · bloques sólidos" width={W} height={H}><F09NEW_MarkC/></Artboard>
        <Artboard id="bauf-d" label="D · constructivista" width={W} height={H}><F09NEW_MarkD/></Artboard>
      </Section>

      <Section id="f09" title="09 · Bauhaus — pack final (con marca-F opción A)">
        <Artboard id="f09f-hero" label="Hero · light" width={W} height={H}><F09F_Hero/></Artboard>
        <Artboard id="f09f-dark" label="Hero · dark" width={W} height={H}><F09F_Dark/></Artboard>
        <Artboard id="f09f-horiz" label="Lockup horizontal · 1 línea" width={W} height={H}><F09F_Horiz/></Artboard>
        <Artboard id="f09f-fav" label="Favicon · 3 escalas + fondo" width={W} height={H}><F09F_Favicons/></Artboard>
        <Artboard id="f09f-palettes" label="Paletas · 4 direcciones" width={W} height={H}><F09F_Palettes/></Artboard>
        <Artboard id="f09f-header" label="Contexto · header del sitio" width={HEAD_W} height={HEAD_H}><F09F_Header/></Artboard>
        <Artboard id="f09f-card" label="Contexto · tarjeta personal" width={W} height={H}><F09F_Card/></Artboard>
      </Section>

      <Section id="f14" title="14 · F Block — pack final">
        <Artboard id="f14f-hero" label="Hero · light" width={W} height={H}><F14F_Hero/></Artboard>
        <Artboard id="f14f-dark" label="Hero · dark · inverso" width={W} height={H}><F14F_Dark/></Artboard>
        <Artboard id="f14f-horiz" label="Lockup horizontal · 1 línea" width={W} height={H}><F14F_Horiz/></Artboard>
        <Artboard id="f14f-fav" label="Favicon · 3 escalas" width={W} height={H}><F14F_Favicons/></Artboard>
        <Artboard id="f14f-sparks" label="Chispas · 4 acentos" width={W} height={H}><F14F_Sparks/></Artboard>
        <Artboard id="f14f-header" label="Contexto · header del sitio" width={HEAD_W} height={HEAD_H}><F14F_Header/></Artboard>
        <Artboard id="f14f-card" label="Contexto · tarjeta personal" width={W} height={H}><F14F_Card/></Artboard>
      </Section>
    </DC>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
})();
</script>
</body>
</html>
