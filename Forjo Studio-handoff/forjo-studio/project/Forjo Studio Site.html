<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Forjo Studio — sitios web con chispa</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Fraunces:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { overflow-x: hidden; }
  a { color: inherit; }
  @keyframes marquee {
    0% { transform: translateX(0); }
    100% { transform: translateX(-33.333%); }
  }
  ::selection { background: #ff5b1f; color: #fbf3e3; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="site-theme.jsx"></script>
<script type="text/babel" src="site-sections.jsx"></script>

<script type="text/babel" data-presets="react">
(() => {
const { useState } = React;
const { buildTheme } = window;
const { Nav, Hero, Marquee, Services, Process, Work, About, Contact, Footer } = window;
const { TweaksPanel, TweakSection, TweakRadio, TweakSelect, TweakToggle, TweakColor, useTweaks } = window;

const DEFAULTS = /*EDITMODE-BEGIN*/{
  "style": "bauhaus",
  "mode": "dark",
  "accent": "#d94a2b",
  "showMarquee": true,
  "showWork": true,
  "showAbout": true
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(DEFAULTS);
  const theme = buildTheme({ style: t.style, mode: t.mode, accentHex: t.accent });

  return (
    <div style={{
      background: theme.bg,
      color: theme.ink,
      fontFamily: theme.fontBody,
      minHeight: "100vh",
    }}>
      <Nav theme={theme}/>
      <Hero theme={theme}/>
      {t.showMarquee && <Marquee theme={theme}/>}
      <Services theme={theme}/>
      <Process theme={theme}/>
      {t.showWork && <Work theme={theme}/>}
      {t.showAbout && <About theme={theme}/>}
      <Contact theme={theme}/>
      <Footer theme={theme}/>

      <TweaksPanel>
        <TweakSection label="Identidad"/>
        <TweakRadio
          label="Estilo de logo"
          value={t.style}
          onChange={v => setTweak("style", v)}
          options={[
            { value: "bauhaus", label: "Bauhaus" },
            { value: "fblock", label: "F Block" },
          ]}
        />
        <TweakRadio
          label="Modo"
          value={t.mode}
          onChange={v => setTweak("mode", v)}
          options={[
            { value: "light", label: "Claro" },
            { value: "dark", label: "Oscuro" },
          ]}
        />

        <TweakSection label="Acento"/>
        <TweakColor
          label="Color"
          value={t.accent}
          onChange={v => setTweak("accent", v)}
          options={["#d94a2b", "#ff5b1f", "#5b3df5", "#1d6c4f"]}
        />

        <TweakSection label="Secciones"/>
        <TweakToggle label="Marquee"
          value={t.showMarquee} onChange={v=>setTweak("showMarquee", v)}/>
        <TweakToggle label="Trabajo"
          value={t.showWork} onChange={v=>setTweak("showWork", v)}/>
        <TweakToggle label="Nosotros"
          value={t.showAbout} onChange={v=>setTweak("showAbout", v)}/>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
})();
</script>
</body>
</html>
